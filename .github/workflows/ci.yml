name: Pipeline CI VulnAI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: 1. Clonar el repositorio
      uses: actions/checkout@v4

    - name: 2. Configurar entorno Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        # Prioriza la eficiencia: usa caché para no descargar todo desde cero en cada ejecución
        cache: 'pip'

    - name: 3. Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt -r requirements-dev.txt

    - name: 4. Análisis estático (Linter)
      run: |
        # Detiene el pipeline si hay errores críticos de sintaxis o variables no definidas
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=venv,.git

    - name: 4b. Estilo (informativo, no bloquea)
      continue-on-error: true
      run: |
        # Reporte completo de estilo; no rompe el build, solo informa en el log.
        flake8 . --count --max-line-length=120 --statistics --exclude=venv,.git

    - name: 5. Ejecución de Pruebas Unitarias
      run: |
        pytest -v

    - name: 6. Build de imagen Docker
      run: |
        docker build -t vulnai:ci .

    - name: 7. Smoke test del contenedor
      run: |
        # Verifica que la imagen construida realmente arranca y responde
        # (lo mismo que hará Railway al desplegarla).
        docker run -d --name vulnai-smoke -p 8000:8000 -e GEMINI_API_KEY=dummy vulnai:ci
        for i in $(seq 1 15); do
          if curl -sf http://localhost:8000/api/scan-progress > /dev/null; then
            echo "OK: el contenedor responde."
            docker rm -f vulnai-smoke
            exit 0
          fi
          sleep 2
        done
        echo "ERROR: el contenedor no respondió en 30s. Logs:"
        docker logs vulnai-smoke
        docker rm -f vulnai-smoke
        exit 1
